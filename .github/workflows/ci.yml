name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Lint & format (Ultracite/Biome)
        run: bun run check
      - name: Type check
        run: bun run check-types
      - name: Unit/integration tests (Vitest)
        run: bun run test
      - name: Build
        run: bun run build
      # TODO (charter §43/§44): accessibility (WCAG 2.2 AA), SAST + secret detection,
      # dependency audit, container scan (Trivy), bundle-size + performance budgets,
      # Playwright visual-regression. Wire as these land in Phase 1+.

  docker:
    name: Docker image build (web + server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      # Build the multi-stage apps/web image (turbo prune → builder → distroless bun)
      # to validate the Dockerfile and enforce the image-size budget (charter §28).
      # GHA layer cache (type=gha) persists BuildKit layers across runs for fast rebuilds.
      # Build-only (load, no push) until a registry/signing decision lands (see
      # docs/architecture/docker-and-cicd.md "Deferred").
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: retailos-web:ci
          build-args: |
            VITE_SERVER_URL=http://localhost:3000
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - name: Enforce image-size budget (web ≤ 350 MB)
        run: |
          bytes=$(docker image inspect retailos-web:ci --format '{{.Size}}')
          mb=$(( bytes / 1024 / 1024 ))
          echo "web image size: ${mb} MB"
          if [ "$mb" -gt 350 ]; then
            echo "::error::web image ${mb} MB exceeds 350 MB budget (charter §28)"
            exit 1
          fi
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          load: true
          tags: retailos-server:ci
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
      - name: Enforce image-size budget (server ≤ 450 MB)
        run: |
          bytes=$(docker image inspect retailos-server:ci --format '{{.Size}}')
          mb=$(( bytes / 1024 / 1024 ))
          echo "server image size: ${mb} MB"
          if [ "$mb" -gt 450 ]; then
            echo "::error::server image ${mb} MB exceeds 450 MB budget (charter §28)"
            exit 1
          fi

  db-rls:
    name: RLS / tenant-isolation (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: RetailOS
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      # ADR 0006: bootstrap roles as the superuser BEFORE migrations (never a
      # Drizzle migration). Then migrate as retailos_migrator; test as retailos_app.
      - name: Bootstrap RLS roles (superuser, pre-migration)
        env:
          PGPASSWORD: password
        run: psql -h localhost -U postgres -d RetailOS -v ON_ERROR_STOP=1 -f packages/db/src/bootstrap/roles.sql
      - name: Apply migrations (as retailos_migrator)
        env:
          MIGRATION_DATABASE_URL: postgresql://retailos_migrator:retailos_migrator@localhost:5432/RetailOS
        run: bun -F @RetailOS/db db:migrate
      - name: RLS + service + §32 integration tests (as retailos_app)
        env:
          # Runtime + test connections use the non-privileged app role.
          DATABASE_URL: postgresql://retailos_app:retailos_app@localhost:5432/RetailOS
          RLS_TEST_DATABASE_URL: postgresql://retailos_app:retailos_app@localhost:5432/RetailOS
          # Dev/CI-only auth env so the api package (Better Auth) can instantiate.
          BETTER_AUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-32xx
          BETTER_AUTH_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3001
        run: bun run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run E2E
        run: bun run e2e
      - name: Upload Playwright report & traces on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
