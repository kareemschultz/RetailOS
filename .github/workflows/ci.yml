name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Lint & format (Ultracite/Biome)
        run: bun run check
      - name: Type check
        run: bun run check-types
      - name: Unit/integration tests (Vitest)
        run: bun run test
      - name: Build
        run: bun run build
      # TODO (charter §43/§44): accessibility (WCAG 2.2 AA), SAST + secret detection,
      # dependency audit, container scan (Trivy), bundle-size + performance budgets,
      # Playwright visual-regression. Wire as these land in Phase 1+.

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run E2E
        run: bun run e2e
      - name: Upload Playwright report & traces on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
