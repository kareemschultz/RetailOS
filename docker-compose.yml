name: RetailOS

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3000
    init: true
    ports:
      - "3001:3001"
    env_file:
      - path: apps/web/.env
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: RetailOS-postgres
    environment:
      POSTGRES_DB: RetailOS
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - RetailOS_postgres_data:/var/lib/postgresql
      # Bootstrap the RLS roles (ADR 0006) on FIRST init only — runs as the
      # superuser, BEFORE any migrations. If the data volume already exists this
      # does NOT re-run; re-bootstrap manually with:
      #   docker exec -i RetailOS-postgres psql -U postgres -d RetailOS < packages/db/src/bootstrap/roles.sql
      # Then apply migrations as retailos_migrator (bun -F @RetailOS/db db:migrate).
      - ./packages/db/src/bootstrap/roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — caching, rate limiting, sync coordination, queues, background jobs (charter §4/§47).
  redis:
    image: redis:7-alpine
    container_name: RetailOS-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - RetailOS_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO — S3-compatible object storage; self-hostable per data-sovereignty (charter §4/§9/§47).
  minio:
    image: minio/minio
    container_name: RetailOS-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - RetailOS_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  RetailOS_postgres_data:
  RetailOS_redis_data:
  RetailOS_minio_data:
